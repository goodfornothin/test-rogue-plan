<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="Rogue Bachata — Movement · Connection · Freedom">
  <meta property="og:description" content="Follow Rogue Bachata on Instagram, Facebook, YouTube, and WhatsApp.">
  <meta property="og:image" content="https://roguebachata.com/images/Rogue%20Bachata%20Logo%20_transparent_.png">
  <meta property="og:url" content="https://roguebachata.com/links.html">
  <meta property="og:type" content="website">
  <meta property="og:logo" content="https://roguebachata.com/images/Rogue%20Bachata%20Logo%20_transparent_.png">

  <meta name="twitter:image" content="https://roguebachata.com/images/Rogue%20Bachata%20Logo%20_transparent_.png">
  <link rel="canonical" href="https://roguebachata.com/links.html">
  <link rel="icon" href="images/Rogue Bachata Logo.svg" type="image/svg+xml">
  <link rel="icon" href="images/Rogue Bachata Logo _transparent_.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --neon-pink:   #FF1B8C;
      --neon-cyan:   #00E0FF;
      --pastel-pink: #FFB7C5;
      --pastel-blue: #87CEEB;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #08020e;
      color: #fff;
      min-height: 100svh;
      overflow-x: hidden;
    }

    /* ── background glow ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(255,27,140,0.13) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 80% 20%, rgba(0,224,255,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── logo mask ── */
    .logo-mask {
      display: inline-block;
      background-color: var(--nav-logo-color, #6CA5BC);
      -webkit-mask: url('images/Rogue Bachata Logo _transparent_.png') center / contain no-repeat;
              mask: url('images/Rogue Bachata Logo _transparent_.png') center / contain no-repeat;
    }
    .nav-logo {
      width: 265px;
      aspect-ratio: 974 / 502;
      -webkit-mask-size: 100% auto;
              mask-size: 100% auto;
    }
    .nav-logo-wrapper {
      height: 100%;
      overflow: visible;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    /* ── nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 0.25rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: rgba(255, 182, 193, 0.92);
      backdrop-filter: blur(10px);
      height: 72px;
    }
    nav .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #1a1a2e;
      text-decoration: none;
      white-space: nowrap;
    }
    nav .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: #1a1a2e;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 0.25rem;
    }
    nav .nav-links { display: flex; align-items: center; }
    nav .nav-links a {
      color: #1a1a2e;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      transition: color 0.3s;
      white-space: nowrap;
    }
    nav .nav-links a:hover { color: var(--pastel-pink); }
    nav.pastel-pink { background: rgba(255, 182, 193, 0.92); }
    nav.pastel-blue  { background: rgba(173, 216, 230, 0.92); }
    nav.pastel-pink .nav-logo { background-color: #6CA5BC; }
    nav.pastel-blue  .nav-logo { background-color: #CC929E; }
    nav.pastel-pink .logo, nav.pastel-pink .nav-links a, nav.pastel-pink .menu-toggle,
    nav.pastel-blue  .logo, nav.pastel-blue  .nav-links a, nav.pastel-blue  .menu-toggle { color: #1a1a2e !important; }
    nav.pastel-pink .nav-links a:hover,
    nav.pastel-blue  .nav-links a:hover { color: #e94560 !important; }

    @media (max-width: 1100px) {
      nav .menu-toggle { display: block; }
      nav .nav-links {
        display: none;
        position: absolute;
        top: 100%; left: 0; right: 0;
        flex-direction: column;
        background: rgba(15, 15, 26, 0.96);
        backdrop-filter: blur(10px);
        padding: 0.7rem 0;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      nav .nav-links.open { display: flex; }
      nav .nav-links a { margin: 0.5rem 1rem; padding: 0.5rem 0; }
      nav.pastel-pink .nav-links { background: rgba(255, 182, 193, 0.97) !important; border-top-color: rgba(26,26,46,0.15) !important; }
      nav.pastel-blue  .nav-links { background: rgba(173, 216, 230, 0.97) !important; border-top-color: rgba(26,26,46,0.15) !important; }
    }

    /* ── page layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 1.5rem 3rem;
      gap: 0;
    }

    /* ── hero logo ── */
    .hero-logo {
      width: min(220px, 55vw);
      aspect-ratio: 974 / 502;
      background-color: var(--pastel-pink);
      -webkit-mask: url('images/Rogue Bachata Logo _transparent_.png') center / contain no-repeat;
              mask: url('images/Rogue Bachata Logo _transparent_.png') center / contain no-repeat;
      -webkit-mask-size: 100% auto;
              mask-size: 100% auto;
      filter: drop-shadow(0 0 24px rgba(255,27,140,0.5)) drop-shadow(0 0 14px rgba(0,224,255,0.35));
      margin-bottom: 1.6rem;
    }

    /* ── tagline ── */
    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 4vw, 1.7rem);
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, var(--pastel-pink) 0%, var(--neon-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline-sub {
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      text-align: center;
      margin-bottom: 2.8rem;
    }

    /* ── link buttons ── */
    .links-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: min(420px, 100%);
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.4rem;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      border: 1.5px solid transparent;
    }
    .link-btn:hover {
      transform: translateY(-3px) scale(1.02);
    }
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.18s ease;
      background: rgba(255,255,255,0.08);
    }
    .link-btn:hover::before { opacity: 1; }

    .link-btn .btn-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 1.3rem;
    }
    .link-btn .btn-label { flex: 1; }
    .link-btn .btn-arrow {
      font-size: 1rem;
      opacity: 0.6;
    }

    /* Instagram */
    .btn-instagram {
      background: linear-gradient(135deg, rgba(225,48,108,0.18) 0%, rgba(193,53,132,0.18) 100%);
      border-color: rgba(225,48,108,0.5);
      color: #f8a0c0;
      box-shadow: 0 4px 24px rgba(225,48,108,0.2);
    }
    .btn-instagram:hover { box-shadow: 0 8px 32px rgba(225,48,108,0.35); }
    .btn-instagram .btn-icon { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: #fff; }

    /* Facebook */
    .btn-facebook {
      background: linear-gradient(135deg, rgba(24,119,242,0.18) 0%, rgba(66,103,178,0.18) 100%);
      border-color: rgba(24,119,242,0.5);
      color: #a0c4f8;
      box-shadow: 0 4px 24px rgba(24,119,242,0.18);
    }
    .btn-facebook:hover { box-shadow: 0 8px 32px rgba(24,119,242,0.32); }
    .btn-facebook .btn-icon { background: #1877f2; color: #fff; }

    /* YouTube */
    .btn-youtube {
      background: linear-gradient(135deg, rgba(255,27,140,0.18) 0%, rgba(255,80,80,0.18) 100%);
      border-color: rgba(255,27,140,0.45);
      color: #ffb7c5;
      box-shadow: 0 4px 24px rgba(255,27,140,0.18);
    }
    .btn-youtube:hover { box-shadow: 0 8px 32px rgba(255,27,140,0.32); }
    .btn-youtube .btn-icon { background: #ff0000; color: #fff; }

    /* WhatsApp */
    .btn-whatsapp {
      background: linear-gradient(135deg, rgba(37,211,102,0.18) 0%, rgba(0,168,132,0.18) 100%);
      border-color: rgba(37,211,102,0.45);
      color: #9ef5c5;
      box-shadow: 0 4px 24px rgba(37,211,102,0.15);
    }
    .btn-whatsapp:hover { box-shadow: 0 8px 32px rgba(37,211,102,0.28); }
    .btn-whatsapp .btn-icon { background: #25d366; color: #fff; }

    /* Website */
    .btn-website {
      background: linear-gradient(135deg, rgba(0,224,255,0.13) 0%, rgba(0,180,220,0.13) 100%);
      border-color: rgba(0,224,255,0.35);
      color: #87CEEB;
      box-shadow: 0 4px 24px rgba(0,224,255,0.12);
    }
    .btn-website:hover { box-shadow: 0 8px 32px rgba(0,224,255,0.24); }
    .btn-website .btn-icon { background: rgba(0,224,255,0.2); color: #00E0FF; }

    /* ── footer ── */
    .page-footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>

  <script>
    const toggle = document.getElementById('menuToggle');
    const links  = document.getElementById('navLinks');
    if (toggle) {
      toggle.addEventListener('click', () => links.classList.toggle('open'));
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => links.classList.remove('open')));
    }
  </script>
  <script>
    (function(){
      var nav = document.querySelector('nav');
      if (!nav) return;
      var classes = ['pastel-pink', 'pastel-blue'];
      function pick() {
        nav.classList.remove('pastel-pink', 'pastel-blue');
        nav.classList.add(classes[Math.floor(Math.random() * 2)]);
      }
      pick();
      document.addEventListener('click', pick);
    })();
  </script>
