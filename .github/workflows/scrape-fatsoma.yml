name: Scrape Fatsoma Events

on:
  schedule:
    # Every Wednesday at 22:30 BST = 21:30 UTC (summer) / 22:30 UTC (winter)
    # Running at 21:30 UTC covers both BST and GMT safely
    - cron: '30 21 * * 3'
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

permissions:
  contents: write  # needed to push events.json

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run scraper
        run: python scripts/scrape-fatsoma.py

      - name: Commit and push events.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to events.json — nothing to commit"
          else
            git commit -m "chore: update events.json from Fatsoma [skip ci]"
            git push
          fi
